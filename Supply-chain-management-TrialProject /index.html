<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ghana Procurement Quiz | Acts 663 & 914</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0f0d;
    --surface: #111a15;
    --border: #1e3020;
    --accent: #4ade80;
    --accent2: #86efac;
    --accent-dim: rgba(74,222,128,0.1);
    --text: #e8f5ec;
    --text-dim: #7a9e82;
    --text-muted: #4a6650;
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --yellow: #fbbf24;
    --sans: 'Space Grotesk', sans-serif;
    --mono: 'Space Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  /* BG GRID */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .tag {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    display: inline-block;
    padding: 0.3rem 0.9rem;
    border-radius: 100px;
    margin-bottom: 1rem;
    background: var(--accent-dim);
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.9rem;
    line-height: 1.6;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1rem;
  }

  /* PROGRESS */
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .progress-text {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  .score-text {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--accent);
    font-weight: 700;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* CATEGORY BADGE */
  .category-badge {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.75rem;
  }

  /* QUESTION */
  .question {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.55;
    margin-bottom: 1.75rem;
    letter-spacing: -0.01em;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 0.75rem; }

  .option {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.25rem;
    cursor: pointer;
    transition: all 0.18s;
    font-size: 0.9rem;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    text-align: left;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }

  .option.correct {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }

  .option.wrong {
    border-color: var(--red);
    background: var(--red-dim);
    color: var(--red);
  }

  .option.disabled { cursor: default; }

  .opt-letter {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .option.correct .opt-letter { border-color: var(--accent); background: var(--accent); color: #0a0f0d; }
  .option.wrong .opt-letter { border-color: var(--red); background: var(--red); color: #0a0f0d; }

  /* EXPLANATION */
  .explanation {
    margin-top: 1.25rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-size: 0.85rem;
    line-height: 1.65;
    color: var(--text-dim);
    display: none;
  }

  .explanation.show { display: block; }
  .explanation strong { color: var(--accent2); }

  /* NEXT BTN */
  .btn-row {
    margin-top: 1.5rem;
    display: flex;
    justify-content: flex-end;
  }

  .btn {
    background: var(--accent);
    color: #0a0f0d;
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.75rem;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .btn.show { display: block; }
  .btn:hover { background: var(--accent2); transform: translateY(-1px); }

  /* TIMER */
  .timer {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-muted);
    text-align: right;
    margin-bottom: 0.5rem;
  }

  .timer.urgent { color: var(--red); }

  /* RESULTS SCREEN */
  .results { text-align: center; }

  .results-score {
    font-size: 5rem;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--accent);
    line-height: 1;
    margin: 1rem 0 0.5rem;
  }

  .results-label {
    font-size: 1.1rem;
    color: var(--text-dim);
    margin-bottom: 1.5rem;
  }

  .results-grade {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .grade-A { color: var(--accent); }
  .grade-B { color: #86efac; }
  .grade-C { color: var(--yellow); }
  .grade-D { color: var(--red); }

  .results-breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin: 1.5rem 0;
  }

  .breakdown-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
  }

  .breakdown-val {
    font-family: var(--mono);
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
  }

  .breakdown-lbl {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  .results-msg {
    background: var(--accent-dim);
    border: 1px solid rgba(74,222,128,0.2);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-size: 0.88rem;
    color: var(--accent2);
    line-height: 1.6;
    margin-bottom: 1.5rem;
    text-align: left;
  }

  .btn-restart {
    background: var(--accent);
    color: #0a0f0d;
    border: none;
    border-radius: 8px;
    padding: 0.85rem 2.5rem;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .btn-restart:hover { background: var(--accent2); transform: translateY(-1px); }

  /* START SCREEN */
  .start-screen { text-align: center; }

  .start-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin: 1.5rem 0;
  }

  .start-stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
  }

  .start-stat .val {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
  }

  .start-stat .lbl {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  .btn-start {
    background: var(--accent);
    color: #0a0f0d;
    border: none;
    border-radius: 10px;
    padding: 1rem 3rem;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 1.05rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 1rem;
    width: 100%;
  }

  .btn-start:hover { background: var(--accent2); transform: translateY(-1px); }

  /* FOOTER */
  footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.75rem;
    font-family: var(--mono);
    margin-top: 1.5rem;
  }

  footer a { color: var(--accent); text-decoration: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="tag">Free · Ghana Procurement · Acts 663 & 914</div>
    <h1>Ghana <span>Procurement</span><br>Quiz Challenge</h1>
    <p class="subtitle">Test your knowledge of Ghana's Public Procurement Acts,<br>supply chain management, and EOQ fundamentals.</p>
  </div>

  <div class="card" id="main-card"></div>

  <footer>
    Built by <a href="https://github.com/Ofrank-design" target="_blank">Frank Oduro</a> · KSTU BSc Procurement & SCM · Kumasi, Ghana 🇬🇭
  </footer>
</div>

<script>
const QUESTIONS = [
  {
    category: "Ghana PPA Act 663",
    question: "Under Ghana's Public Procurement Act 663, what is the primary purpose of the Public Procurement Authority (PPA)?",
    options: [
      "To import goods on behalf of government agencies",
      "To harmonise, coordinate and monitor public procurement processes",
      "To manage Ghana's national budget",
      "To audit government financial statements"
    ],
    answer: 1,
    explanation: "<strong>Act 663 Section 3</strong> establishes the PPA to harmonise, coordinate and monitor public procurement processes to ensure transparency, value for money, and accountability in the use of public funds."
  },
  {
    category: "Ghana PPA Act 663",
    question: "Which procurement method under Act 663 is used when goods are available from only one supplier?",
    options: [
      "Restricted tendering",
      "Request for quotations",
      "Single source procurement",
      "International competitive tendering"
    ],
    answer: 2,
    explanation: "<strong>Single Source Procurement (Act 663 Section 40)</strong> is used when goods, works or services are only available from one source, or when there is an urgent need that cannot be met through competitive tendering."
  },
  {
    category: "Ghana PPA Act 914",
    question: "Ghana's Public Procurement (Amendment) Act 914 introduced which key digital system to improve transparency?",
    options: [
      "GIFMIS — Ghana Integrated Financial Management System",
      "Ghana e-GP — Electronic Government Procurement platform",
      "IPPD — Integrated Payroll and Personnel Database",
      "CAGD — Controller and Accountant General's Department portal"
    ],
    answer: 1,
    explanation: "<strong>Act 914</strong> introduced and mandated the use of the <strong>Ghana e-GP (Electronic Government Procurement)</strong> platform to digitise procurement processes, increase transparency, and reduce fraud across all public entities."
  },
  {
    category: "EOQ & Inventory",
    question: "A procurement officer has: Annual demand = 2,400 units, Ordering cost = GHS 60, Holding cost = GHS 4/unit/year. What is the EOQ?",
    options: [
      "268 units",
      "300 units",
      "240 units",
      "424 units"
    ],
    answer: 0,
    explanation: "<strong>EOQ = √(2DS/H) = √(2 × 2400 × 60 / 4) = √72,000 = 268 units.</strong> This is the optimal order quantity that minimises total inventory costs."
  },
  {
    category: "Supply Chain Management",
    question: "Which of the following best describes the 'Bullwhip Effect' in supply chain management?",
    options: [
      "The reduction in lead time as orders move upstream",
      "The amplification of demand variability as orders move upstream in the supply chain",
      "The increase in product quality along the supply chain",
      "The decrease in transportation costs with larger order quantities"
    ],
    answer: 1,
    explanation: "The <strong>Bullwhip Effect</strong> describes how small fluctuations in consumer demand can cause increasingly large swings in orders as you move upstream (retailer → wholesaler → distributor → manufacturer). Sharing real-time demand data helps reduce it."
  },
  {
    category: "Ghana PPA Act 663",
    question: "Under Act 663, which body is responsible for handling procurement-related complaints and appeals?",
    options: [
      "The Attorney General's Department",
      "The Public Accounts Committee of Parliament",
      "The Public Procurement Authority",
      "The Internal Audit Agency"
    ],
    answer: 2,
    explanation: "<strong>The Public Procurement Authority (PPA)</strong> under Act 663 has the mandate to receive and investigate complaints from tenderers and other stakeholders about procurement proceedings."
  },
  {
    category: "Logistics",
    question: "What does 'Incoterms' stand for and who publishes them?",
    options: [
      "International Commerce Terms — published by the World Bank",
      "International Commercial Terms — published by the International Chamber of Commerce (ICC)",
      "Integrated Contract Terms — published by UNCTAD",
      "International Cost Terms — published by WTO"
    ],
    answer: 1,
    explanation: "<strong>Incoterms (International Commercial Terms)</strong> are published by the <strong>International Chamber of Commerce (ICC)</strong>. The current version is Incoterms 2020. They define the responsibilities of buyers and sellers in international trade."
  },
  {
    category: "Supply Chain Management",
    question: "In ABC inventory analysis, 'A' items typically represent what percentage of total items but what percentage of total value?",
    options: [
      "50% of items, 50% of value",
      "70% of items, 20% of value",
      "10–20% of items, 70–80% of value",
      "30% of items, 30% of value"
    ],
    answer: 2,
    explanation: "<strong>ABC Analysis (Pareto Principle):</strong> 'A' items = roughly 10–20% of all items but account for 70–80% of total inventory value. 'B' items = 30% of items, 15–25% of value. 'C' items = 50% of items, only 5% of value."
  },
  {
    category: "Ghana PPA Act 914",
    question: "Act 914 introduced a specific threshold above which all procurement must be published on Ghana e-GP. This requirement promotes which procurement principle?",
    options: [
      "Economy",
      "Speed",
      "Transparency",
      "Confidentiality"
    ],
    answer: 2,
    explanation: "<strong>Transparency</strong> is the core principle Act 914's e-GP mandate promotes. Publishing tenders publicly ensures open competition, reduces corruption, and allows citizens and auditors to monitor public spending."
  },
  {
    category: "EOQ & Inventory",
    question: "Safety stock in inventory management is primarily used to:",
    options: [
      "Reduce the cost of placing orders",
      "Protect against stockouts caused by demand variability or supply delays",
      "Increase the economic order quantity",
      "Reduce the reorder point"
    ],
    answer: 1,
    explanation: "<strong>Safety Stock</strong> acts as a buffer to protect against unexpected demand spikes or supplier delivery delays. Formula: Safety Stock = Z × σ_LT × √Lead Time, where Z is the service level factor and σ_LT is demand standard deviation."
  },
  {
    category: "Supplier Management",
    question: "A supplier scorecard typically measures performance across which four key dimensions?",
    options: [
      "Price, Location, Size, Age",
      "Quality, Delivery, Cost, Service/Compliance",
      "Profit, Revenue, Assets, Employees",
      "Speed, Colour, Packaging, Weight"
    ],
    answer: 1,
    explanation: "The standard supplier scorecard framework measures: <strong>Quality</strong> (defect rates), <strong>Delivery</strong> (on-time rate), <strong>Cost</strong> (price competitiveness, savings), and <strong>Service/Compliance</strong> (responsiveness, regulatory adherence)."
  },
  {
    category: "Ghana PPA Act 663",
    question: "What is the minimum number of quotations required under Request for Quotations (RFQ) method in Act 663?",
    options: [
      "One quotation from a preferred supplier",
      "Two quotations for comparison",
      "At least three quotations",
      "Five quotations from registered suppliers"
    ],
    answer: 2,
    explanation: "Under <strong>Act 663 Section 42</strong>, the Request for Quotations method requires a minimum of <strong>three quotations</strong> to ensure competition. This method is used for low-value, readily available goods."
  },
  {
    category: "Logistics",
    question: "Which Incoterm requires the seller to bear all costs and risks up to the named port of destination, including freight and insurance?",
    options: [
      "FOB — Free On Board",
      "EXW — Ex Works",
      "CIF — Cost, Insurance and Freight",
      "FCA — Free Carrier"
    ],
    answer: 2,
    explanation: "<strong>CIF (Cost, Insurance and Freight)</strong> requires the seller to pay for transportation and insurance to the named destination port. Risk transfers to the buyer once goods are on board the vessel."
  },
  {
    category: "Supply Chain Management",
    question: "The SCOR (Supply Chain Operations Reference) model covers which five core processes?",
    options: [
      "Buy, Make, Move, Store, Sell",
      "Plan, Source, Make, Deliver, Return",
      "Forecast, Order, Receive, Store, Ship",
      "Design, Procure, Manufacture, Distribute, Service"
    ],
    answer: 1,
    explanation: "The <strong>SCOR Model</strong> defines five core supply chain processes: <strong>Plan</strong> (demand/supply planning), <strong>Source</strong> (procurement), <strong>Make</strong> (manufacturing), <strong>Deliver</strong> (logistics), and <strong>Return</strong> (reverse logistics)."
  },
  {
    category: "Ghana PPA Act 914",
    question: "Under Act 914, which entity is required to approve sole source procurement above a certain threshold?",
    options: [
      "The Minister of Finance",
      "The Auditor General",
      "The Public Procurement Authority Board",
      "The President of Ghana"
    ],
    answer: 2,
    explanation: "Under <strong>Act 914</strong>, single/sole source procurements above specified thresholds must receive prior approval from the <strong>Public Procurement Authority Board</strong> to prevent abuse of this non-competitive method."
  }
];

// ─── STATE ───────────────────────────────────
let current = 0;
let score = 0;
let answered = false;
let timer = null;
let timeLeft = 30;
let correctCount = 0;
let wrongCount = 0;
let shuffled = [];

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

// ─── SCREENS ─────────────────────────────────
function showStart() {
  const card = document.getElementById('main-card');
  card.innerHTML = `
    <div class="start-screen">
      <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:0.5rem;">Ready to test your knowledge?</h2>
      <p style="color:var(--text-dim);font-size:0.88rem;line-height:1.6;margin-bottom:1.5rem;">
        15 questions covering Ghana PPA Acts 663 & 914, EOQ calculations, logistics, and supply chain management. 30 seconds per question.
      </p>
      <div class="start-stats">
        <div class="start-stat"><div class="val">15</div><div class="lbl">Questions</div></div>
        <div class="start-stat"><div class="val">30s</div><div class="lbl">Per Question</div></div>
        <div class="start-stat"><div class="val">5</div><div class="lbl">Categories</div></div>
      </div>
      <button class="btn-start" onclick="startQuiz()">Start Quiz →</button>
    </div>
  `;
}

function startQuiz() {
  current = 0; score = 0; correctCount = 0; wrongCount = 0;
  shuffled = shuffle(QUESTIONS);
  showQuestion();
}

function showQuestion() {
  clearInterval(timer);
  answered = false;
  timeLeft = 30;

  const q = shuffled[current];
  const card = document.getElementById('main-card');
  const progress = ((current) / shuffled.length) * 100;

  card.innerHTML = `
    <div class="progress-row">
      <span class="progress-text">Question ${current + 1} of ${shuffled.length}</span>
      <span class="score-text">Score: ${score}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="timer" id="timer-display">⏱ ${timeLeft}s remaining</div>
    <div class="category-badge">${q.category}</div>
    <div class="question">${q.question}</div>
    <div class="options" id="options-container">
      ${q.options.map((opt, i) => `
        <button class="option" id="opt-${i}" onclick="selectAnswer(${i})">
          <span class="opt-letter">${String.fromCharCode(65+i)}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div class="explanation" id="explanation">${q.explanation}</div>
    <div class="btn-row">
      <button class="btn" id="next-btn" onclick="nextQuestion()">
        ${current + 1 === shuffled.length ? 'See Results →' : 'Next Question →'}
      </button>
    </div>
  `;

  // Start timer
  timer = setInterval(() => {
    timeLeft--;
    const el = document.getElementById('timer-display');
    if (el) {
      el.textContent = `⏱ ${timeLeft}s remaining`;
      if (timeLeft <= 10) el.classList.add('urgent');
    }
    if (timeLeft <= 0) {
      clearInterval(timer);
      if (!answered) timeUp();
    }
  }, 1000);
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timer);

  const q = shuffled[current];
  const opts = document.querySelectorAll('.option');

  opts.forEach(o => o.classList.add('disabled'));
  opts[q.answer].classList.add('correct');

  if (idx === q.answer) {
    score += Math.max(10, timeLeft * 3);
    correctCount++;
  } else {
    opts[idx].classList.add('wrong');
    wrongCount++;
  }

  document.getElementById('explanation').classList.add('show');
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('timer-display').textContent = idx === q.answer ? '✅ Correct!' : '❌ Incorrect';
  document.getElementById('timer-display').classList.remove('urgent');
  document.getElementById('timer-display').style.color = idx === q.answer ? 'var(--accent)' : 'var(--red)';
}

function timeUp() {
  answered = true;
  const q = shuffled[current];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));
  opts[q.answer].classList.add('correct');
  wrongCount++;
  document.getElementById('explanation').classList.add('show');
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('timer-display').textContent = "⏰ Time's up!";
  document.getElementById('timer-display').style.color = 'var(--yellow)';
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) showResults();
  else showQuestion();
}

function showResults() {
  clearInterval(timer);
  const pct = Math.round((correctCount / shuffled.length) * 100);
  let grade, gradeClass, msg;

  if (pct >= 85) {
    grade = "A — Excellent!"; gradeClass = "grade-A";
    msg = "Outstanding performance! You have a strong grasp of Ghana's procurement laws and SCM principles. You're ready for a procurement role — keep building on this foundation with your KSTU studies.";
  } else if (pct >= 70) {
    grade = "B — Good"; gradeClass = "grade-B";
    msg = "Good work! You understand the core concepts. Focus on reviewing Ghana PPA Act 914 provisions and EOQ calculations to close any gaps before your KSTU studies begin.";
  } else if (pct >= 55) {
    grade = "C — Fair"; gradeClass = "grade-C";
    msg = "You have a basic understanding but there's room to improve. Review Acts 663 & 914 sections on procurement methods, and practice EOQ formula calculations. Retake this quiz after studying.";
  } else {
    grade = "D — Needs Work"; gradeClass = "grade-D";
    msg = "Don't worry — this is exactly why you're studying! Review Ghana PPA Acts 663 & 914 and the SCM fundamentals in your portfolio. Retake the quiz to track your improvement.";
  }

  const card = document.getElementById('main-card');
  card.innerHTML = `
    <div class="results">
      <div style="font-size:0.78rem;color:var(--text-muted);font-family:var(--mono);margin-bottom:0.5rem;">FINAL SCORE</div>
      <div class="results-score">${score}</div>
      <div class="results-label">points earned</div>
      <div class="results-grade ${gradeClass}">${grade}</div>
      <div class="results-breakdown">
        <div class="breakdown-item">
          <div class="breakdown-val">${correctCount}</div>
          <div class="breakdown-lbl">Correct</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-val">${wrongCount}</div>
          <div class="breakdown-lbl">Wrong</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-val">${pct}%</div>
          <div class="breakdown-lbl">Accuracy</div>
        </div>
      </div>
      <div class="results-msg">${msg}</div>
      <button class="btn-restart" onclick="startQuiz()">🔄 Retake Quiz</button>
    </div>
  `;
}

// ─── INIT ─────────────────────────────────────
showStart();
</script>
</body>
</html>
